{% extends "base.html" %}

{% block title %}
  Список задач
{% endblock %}

{% block content %}
  <div>
    <h1>Список задач пользователя</h1>
  </div>
  <main>
    <ul>
      {% for task in tasks %}
        <li><a href="{% url 'tasks:task' %}">{{ task }}</a></li>
      {% endfor %}
      <li>
        <a href="{% url 'tasks:add_task' %}">Добавить новую заметку</a>
      </li>
    </ul>
  </main>
{% endblock %}
