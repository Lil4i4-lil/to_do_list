{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load static %}

{% block title %}
  {{ title }}
{% endblock %}

{% block content %}
  <form {% block form_info %} {% endblock %}>
    {% csrf_token %}
    <div class="card">
      <div class="card-header">
        <h1>{{ title }}</h1>
      </div>
      <div class="card-body">
        {% bootstrap_form form %}
      </div>
      <div class="card-footer">
        {% block form_footer %} {% endblock %}
      </div>
    </div>
  </form>
  {% block extra_content %}{% endblock %}
{% endblock %}
