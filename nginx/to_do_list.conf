server {
    listen 8088;

    error_log /app/www/to_do_list/logs/error.log;
    access_log /app/www/to_do_list/logs/access.log;

    location /static/ {
        root /app/www/to_do_list;
    }

    location /media/ {
        root /app/www/to_do_list;
    }

    location / {
        proxy_pass http://to_do_list:8000;
        proxy_set_header Host $host; # имя домена из исходного запроса пользователя
        proxy_set_header X-Real-IP $remote_addr; # IP того, кто установил соединение с nginx (то есть реальный IP браузера пользователя)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # берет старое значение заголовка X-Forwarded-For (если оно уже было от предыдущего прокси) и добавляет к нему через запятую IP клиента $remote_addr
        proxy_set_header X-Forwarded-Proto $scheme; # содержит либо http, либо https
    }
}